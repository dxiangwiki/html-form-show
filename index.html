<style>
pre {

  overflow-x: auto;
}
.code-block {
  max-height: 420px;
  overflow-y: auto;
}
.nav-link {
  transition: all 0.22s ease;
}
.nav-link:hover {
  transform: translateX(4px);
}
.nav-link.active {
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: white;
  box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
}
.card {

}

  transition: all 0.2s ease;
}
.copy-btn:hover {

</style>
</head>
<body class="gradient-bg text-slate-800 h-screen overflow-hidden">

        <nav id="nav" class="space-y-2">

  <script>
    // 将html特殊字符转义，用来在pre原样显示代码
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
    }

    const routes = {
      "/": {
        title: "欢迎查看 HTML 表单元素",

            <p class="text-slate-500 max-w-lg mx-auto">左侧选择表单类型：上方预览效果，下方展示源码文本。</p>

            </div>

        codeText: ""

        demoHtml: `

            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">密码</label>
              <input type="password" name="pwd" placeholder="请输入密码" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />

              <input type="number" name="age" value="18" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />

            </div>
          </form>`,
        codeText: `<form>
    用户名：<input type="text" name="username" placeholder="请输入用户名">

      "/textarea": {

                  <input type="password" name="pass" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                </div>

            <fieldset class="border border-slate-300 p-4 rounded-xl">
              <legend class="px-2 font-semibold text-emerald-700">个人信息</legend>

                <label class="block text-sm font-medium text-slate-600 mb-1">年龄</label>

    <fieldset>

        密码：<input type="password" name="pass">

    <fieldset>

    </fieldset>

      }
    };

    function getHashPath() {
      let hash = location.hash.slice(1);
      return hash || "/";
    }

    function renderPage() {
      const path = getHashPath();
      const page = routes[path] || routes["/"];
      const contentWrap = document.getElementById("page-content");
      document.querySelectorAll("#nav a").forEach(link => {
        link.classList.remove("active");
        if (link.getAttribute("href") === "#" + path) {
          link.classList.add("active");
        }
      });

      let codeHtml = "";
      if(page.codeText){
        const displayCode = escapeHtml(page.codeText);
        codeHtml = `
            <div>
              <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm uppercase tracking-widest text-slate-400 font-semibold">原生HTML源代码</h3>
                <button onclick="copyCode(this)" data-code="${encodeURIComponent(page.codeText)}" class="copy-btn px-3 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">复制代码</button>
              </div>
              <pre class="code-block bg-slate-900 text-green-400 p-4 rounded-xl"><code>${displayCode}</code></pre>
            </div>`;
      }

      contentWrap.innerHTML = `
        <div class="card rounded-2xl shadow-lg p-5 lg:p-6">
          <h2 class="text-2xl font-bold text-slate-800 mb-4">${page.title}</h2>
          <div class="mb-5">
            <h3 class="text-sm uppercase tracking-widest text-slate-400 font-semibold mb-3">示例运行效果</h3>
            <div class="border border-slate-200 rounded-xl p-5 bg-slate-50">
              ${page.demoHtml}
            </div>
          </div>
          ${codeHtml}
        </div>`;
    }

    window.copyCode = async function (btn) {
      const code = decodeURIComponent(btn.dataset.code);
      await navigator.clipboard.writeText(code);
      const originalText = btn.textContent;
      btn.textContent = "已复制";
      setTimeout(() => (btn.textContent = originalText), 1500);
    };
    window.addEventListener("hashchange", renderPage);
    renderPage();
  </script>
